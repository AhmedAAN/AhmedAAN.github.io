<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Page Not Found</title>
		<script>
			// This script redirects any 404 error page to index.html and preserves the URL.
			var redirectTo = location.pathname + location.search;
			window.location.replace("/" + redirectTo);
		</script>
	</head>
	<body></body>
</html>
