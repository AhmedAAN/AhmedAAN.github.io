		<script type="importmap">
			{
				"imports": {
					"socket.io-client": "https://cdn.socket.io/4.7.4/socket.io.esm.min.js"
				}
			}
		</script>

		<script type="module">
			import { io } from "socket.io-client";

			document.getElementById("socket").onclick = function () {
				handleSocket();
			};

			document.getElementById("mute").onclick = function () {
				toggleAudio();
			}

			document.getElementById("video").onclick = function () {
				toggleVideo();
			}

			let isScreenSharing = false;

			document.getElementById('toggleStreamButton').addEventListener('click', async () => {
    			isScreenSharing = !isScreenSharing;
    			if (isScreenSharing) {
        			await setLocalScreenShare();
    			} else {
        			await setLocalCamera();
    			}
			});

			var socket = io("https://radwan.up.railway.app/", {
				withCredentials: true,
			});
			function handleSocket() {
				document.getElementById("getchats").onclick = function () {
					getchats();
				};

				socket.emit("message", {
					chatID: "66353076b3e15785e556d3d4",
					msg: "bla",
				});
				socket.on("message", (message) => {
					console.log(message);
				});

				socket.on("notification", (message) => {
					console.log(message);
				});

				function getchats() {
					const url2 = "http://localhost:4000/notify";
					const data2 = {
						message: { name: "ahmed", url: "http://bbkbb.com" },
						receiverID: "663513b7b3e15785e556d3ba",
					};

					setTimeout(() => {
						fetch(url2, {
							method: "POST",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify(data2),
							credentials: "include",
						});
					}, "1000");
				}
			}
			//-------------------------------------------------------
			//--------------------------------------------------------

			const roomSelectionContainer = document.getElementById(
				"room-selection-container"
			);
			const roomInput = document.getElementById("room-input");
			const connectButton = document.getElementById("connect-button");

			const videoChatContainer = document.getElementById(
				"video-chat-container"
			);
			const localVideoComponent = document.getElementById("local-video");
			const remoteVideoComponent = document.getElementById("remote-video");

			// Variables.
			const mediaConstraints = {
				audio: true,
				video: { width: 1280, height: 720 },
			};
			let localStream;
			let remoteStream;
			let isRoomCreator;
			let rtcPeerConnection; // Connection between the local device and the remote peer.
			let roomId;

			// Free public STUN servers provided by Google.
			var iceServers = {
				iceServers: [
					{ urls: 'stun:stun.l.google.com:19302' },
					{ urls: 'stun:stun1.l.google.com:19302' },
					{ urls: 'stun:stun2.l.google.com:19302' },
					{ urls: 'stun:stun3.l.google.com:19302' },
					{ urls: 'stun:stun4.l.google.com:19302' },
					{ urls: 'stun:stun.relay.metered.ca:80' },
					{ 
						urls: 'turn:global.relay.metered.ca:80',
						username: '90b3064af83498636cc614a1',
						credential: 'soPV9UVdMP/szrXN'
					},
					{
						urls: 'turn:global.relay.metered.ca:80?transport=tcp',
						username: '90b3064af83498636cc614a1',
						credential: 'soPV9UVdMP/szrXN'
					},
					{
						urls: 'turn:global.relay.metered.ca:443',
						username: '90b3064af83498636cc614a1',
						credential: 'soPV9UVdMP/szrXN'
					},
					{
						urls: 'turns:global.relay.metered.ca:443?transport=tcp',
						username: '90b3064af83498636cc614a1',
						credential: 'soPV9UVdMP/szrXN'
					}
				],
			};

			/* */


			// BUTTON LISTENER ============================================================
			connectButton.addEventListener("click", () => {
				joinRoom(roomInput.value);
			});

			// SOCKET EVENT CALLBACKS =====================================================
			socket.on("room_created", async () => {
				console.log("Socket event callback: room_created");

				await setLocalStream(mediaConstraints);
				isRoomCreator = true;
			});

			socket.on("room_joined", async () => {
				console.log("Socket event callback: room_joined");

				await setLocalStream(mediaConstraints);
				socket.emit("start_call", roomId);
			});

			socket.on("full_room", () => {
				console.log("Socket event callback: full_room");

				alert("The room is full, please try another one");
			});

			// FUNCTIONS ==================================================================
			function joinRoom(room) {
				if (room === "") {
					alert("Please type a room ID");
				} else {
					roomId = room;
					console.log(room);
					socket.emit("join", room);
					showVideoConference();
				}
			}

			function showVideoConference() {
				roomSelectionContainer.style = "display: none";
				videoChatContainer.style = "display: block";
			}

			async function setLocalStream(mediaConstraints) {
				let stream;
				try {
					stream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
				} catch (error) {
					console.error("Could not get user media", error);
				}

				localStream = stream;
				localVideoComponent.srcObject = stream;
			}
			//-------------------------------------------------------
			//-------------------------------------------------------
			socket.on("start_call", async () => {
				console.log("Socket event callback: start_call");

				if (isRoomCreator) {
					rtcPeerConnection = new RTCPeerConnection(iceServers);
					addLocalTracks(rtcPeerConnection);
					rtcPeerConnection.ontrack = setRemoteStream;
					rtcPeerConnection.onicecandidate = sendIceCandidate;
					rtcPeerConnection.oniceconnectionstatechange = printActiveConnection;
					await createOffer(rtcPeerConnection);
				}
			});

			socket.on("webrtc_offer", async (offer) => {
				console.log("Socket event callback: webrtc_offer");

				if (!isRoomCreator) {
					rtcPeerConnection = new RTCPeerConnection(iceServers);
					addLocalTracks(rtcPeerConnection);
					rtcPeerConnection.ontrack = setRemoteStream;
					console.log(remoteVideoComponent.srcObject)
					rtcPeerConnection.onicecandidate = sendIceCandidate;
					rtcPeerConnection.oniceconnectionstatechange = printActiveConnection;
					rtcPeerConnection.setRemoteDescription(
						offer
					);
					await createAnswer(rtcPeerConnection);
				}
			});

			socket.on("webrtc_answer", (event) => {
				console.log("Socket event callback: webrtc_answer");

				rtcPeerConnection.setRemoteDescription(
					new RTCSessionDescription(event)
				);
			});

			socket.on("webrtc_ice_candidate", (event) => {
				console.log("Socket event callback: webrtc_ice_candidate");

				// ICE candidate configuration.
				var candidate = new RTCIceCandidate({
					sdpMLineIndex: event.label,
					candidate: event.candidate,
				});
				rtcPeerConnection.addIceCandidate(candidate);
			});

			// FUNCTIONS ==================================================================
			function addLocalTracks(rtcPeerConnection) {
				localStream.getTracks().forEach((track) => {
					rtcPeerConnection.addTrack(track, localStream);
				});
			}

			async function createOffer(rtcPeerConnection) {
				let sessionDescription;
				try {
					sessionDescription = await rtcPeerConnection.createOffer();
					rtcPeerConnection.setLocalDescription(sessionDescription);
				} catch (error) {
					console.error(error);
				}
				console.log(sessionDescription);

				socket.emit("webrtc_offer", {
					type: "webrtc_offer",
					sdp: sessionDescription,
					roomID: roomId,
				});
			}

			async function createAnswer(rtcPeerConnection) {
				let sessionDescription;
				try {
					sessionDescription = await rtcPeerConnection.createAnswer();
					rtcPeerConnection.setLocalDescription(sessionDescription);
				} catch (error) {
					console.error(error);
				}
				console.log(sessionDescription)

				socket.emit("webrtc_answer", {
					type: "webrtc_answer",
					sdp: sessionDescription,
					roomID: roomId,
				});
			}

			function setRemoteStream(event) {
				remoteVideoComponent.srcObject = event.streams[0];
				
				console.log(remoteVideoComponent.srcObject)
				remoteStream = event.stream;
			}

			let selectedIceCandidate = null;
			function sendIceCandidate(event) {
				selectedIceCandidate = event.candidate;
				if (event.candidate) {
					socket.emit("webrtc_ice_candidate", {
						roomID: roomId,
						label: event.candidate.sdpMLineIndex,
						candidate: event.candidate.candidate,
					});
				}
			}

			
			function printActiveConnection(event) {
				console.log("ICE connection state changed to:", rtcPeerConnection.iceConnectionState);
    
    			// If the ICE connection state is "connected", it means a candidate was successfully used
    			if (rtcPeerConnection.iceConnectionState === "connected") {
        			console.log("Selected ICE candidate:", selectedIceCandidate);
    			}
			}

			function toggleAudio() {
				localStream.getAudioTracks().forEach(track => {
					track.enabled = !track.enabled;
				})
			}

			function toggleVideo() {
				localStream.getVideoTracks().forEach(track => {
					track.enabled = !track.enabled;
				})
			}

			async function setLocalCamera() {
    			let stream;
   				 try {
        			stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    			} catch (error) {
        			console.error("Could not get user media", error);
    			}

    			updateLocalStream(stream);
			}

			async function setLocalScreenShare() {
    			let stream;
    			try {
        			stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    			} catch (error) {
        			console.error("Could not get screen sharing media", error);
    			}

    			updateLocalStream(stream);
			}

			function updatePeerConnection() {
    			// Assume localPeerConnection is your RTCPeerConnection instance
    			// You may need to remove and add tracks based on your use case
    			localPeerConnection.getSenders().forEach(sender => {
        			localStream.getTracks().forEach(track => {
            			if (track.kind === sender.track.kind) {
                			sender.replaceTrack(track);
            			}
        			});
    			});
			}
		</script>
	</body>
</html>
